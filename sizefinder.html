<!DOCTYPE html>
<html lang="de_DE">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Schinkennugget" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div>Width: <span id="width"></span></div>
  <div>Height: <span id="height"></span></div>
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Zinc_fragment_sublimed_and_1cm3_cube.jpg" />

  <script>
    setTimeout(() => {
      const width = document.getElementsByTagName("img")[0].clientWidth;
      const height = document.getElementsByTagName("img")[0].clientHeight;
      document.getElementById("width").innerHTML = width;
      document.getElementById("height").innerHTML = height;

      try {
      navigator.clipboard.writeText(`width="${width}px" height="${height}px"`);
    } catch (err) {
      console.error(err.name)
    }
      console.log(`width="${width}px" height="${height}px"`);
    }, 1000);

    document.getElementsByName("span").forEach(elem => {
      this.onclick = () => {
        navigator.clipboard.writeText(this.innerHTML);
      }
    });
  </script>

</body>

</html>
