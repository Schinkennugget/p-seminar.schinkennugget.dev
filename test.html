      overflow-x: auto;
      height: min-content;

    .pse-item {
      display: grid;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
      grid-template-areas: ". ordnungszahl"
        "elementsymbol elementsymbol"
        "elementname elementname";

    .pse-item-ordnungszahl {
      grid-area: ordnungzahl;

    }

    .pse-item-elementsymbol {

    }

    .pse-item-elementname {
