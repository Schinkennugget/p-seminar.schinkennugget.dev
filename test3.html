<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <div id="test"></div>
  <script>
    const elem = document.getElementById("test");
    
    test.addEventListener("pointerover", event => {
      elem.innerHTML += "PointerType: " + event.pointerType;
    });
  </script>
</body>

</html>
