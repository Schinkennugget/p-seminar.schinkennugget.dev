<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="overflow: hidden;">
  <div id="mouseenter"></div>
  <div id="mousemove"></div>
  <div id="mousedown"></div>
  <div id="pointerenter"></div>
  <div id="pointermove"></div>
  <div id="touchstart"></div>
  <div id="touchmove"></div>
  <script>
    window.addEventListener("mouseenter", event => {
      document.getElementById("mouseenter").innerHTML = `MouseEnter`;
      return false;
    });
    window.addEventListener("mouseleave", event => {
      document.getElementById("mouseenter").innerHTML = ``;
      return false;
    });
    
    window.addEventListener("mousemove", event => {
      document.getElementById("mousemove").innerHTML = `MouseMove: ${event.clientX}`;
      return false;
    });
    
    window.addEventListener("mousedown", event => {
      document.getElementById("mousedown").innerHTML = `MouseDown`;
      return false;
    });
    window.addEventListener("mouseup", event => {
      document.getElementById("mousedown").innerHTML = ``;
      return false;
    });
    
    window.addEventListener("mouseup", event => {
      document.getElementById("mousedown").innerHTML = ``;
      return false;
    });
    window.addEventListener("pointerenter", event => {
      document.getElementById("pointerenter").innerHTML = `PointerEnter: ${event.pointerType}`;
      return false;
    });
    window.addEventListener("pointerleave", event => {
      document.getElementById("pointerleave").innerHTML = ``;
      return false;
    });
    
  </script>
</body>

</html>
