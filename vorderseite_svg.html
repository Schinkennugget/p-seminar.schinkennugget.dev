<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <script>
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", 250 * 5);
    svg.setAttribute("height", 130 * 5);

    function makeRect(x, y, width, height) {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", x * 5);
      rect.setAttribute("y", y * 5);
      rect.setAttribute("width", width * 5)
      rect.setAttribute("height", height * 5);
      rect.setAttribute("fill", "none");
      rect.setAttribute("stroke", "black");
      rect.setAttribute("stroke-width", "1");
      return rect;
    }

    function makeLine(fromX, fromY, toX, toY) {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", fromX);
      line.setAttribute("y1", fromY);
      line.setAttribute("x2", toX);
      line.setAttribute("y2", toY);
      line.setAttribute("stroke", "black");
      line.setAttribute("stroke-width", "1")
      return line;
    }


    //Äußere Form
    svg.appendChild(makeRect(0, 0, 250, 130, false));

    for (let i = 0; i < 4; i++) {
      const x = 7.5 + i * 30;
      svg.appendChild(makeRect(5, x, 10, 12.5));
      svg.appendChild(makeRect(17.5, x, 10, 12.5));
      svg.appendChild(makeRect(35, x, 15, 12.5));
      svg.appendChild(makeRect(55, x, 10, 22.5));
      svg.appendChild(makeRect(72.5, x, 10, 12.5));
      svg.appendChild(makeRect(85, x, 20, 12.5));

      if (i < 3) svg.appendChild(makeRect(120, 20 + i * 30, 10, 12.5));

      svg.appendChild(makeRect(145, x, 20, 12.5));
      svg.appendChild(makeRect(167.5, x, 10, 12.5));
      svg.appendChild(makeRect(185, x, 10, 22.5));
      svg.appendChild(makeRect(200, x, 15, 12.5));
      svg.appendChild(makeRect(222.5, x, 10, 12.5));
      svg.appendChild(makeRect(235, x, 10, 12.5));
    }
    svg.appendChild(makeRect(110, 100, 30, 30));
    svg.appendChild(makeRect(117.5, 107.5, 15, 25));


    document.body.appendChild(svg);

    const svgString = svg.outerHTML;

    const blob = new Blob([svgString], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "output.svg";
    a.click();

    URL.revokeObjectURL(url);
  </script>
</body>

</html>
